<!DOCTYPE html>
<html>
<head>
    <title>Footer Design</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        footer {
            background-color: #000;
            color: #fff;
            padding: 40px 20px 0;
        }

        .footer-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 30px;
        }

        .footer-section {
            flex: 1;
            min-width: 180px;
        }

        .footer-section h3 {
            margin-bottom: 15px;
            border-bottom: 2px solid white;
            display: inline-block;
            padding-bottom: 5px;
        }

        .footer-section a {
            display: block;
            color: #ccc;
            text-decoration: none;
            margin: 6px 0;
            font-size: 14px;
        }

        .footer-section a:hover {
            color: #fff;
        }

        .media-icons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .media-icons div {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background-color: #1e90ff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
        }

        .footer-bottom {
            background-color: #2c2c2c;
            margin-top: 30px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .footer-container {
                flex-direction: column;
            }

            .footer-bottom {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<footer>

    <h2>company</h2>

    <div class="footer-container">

        <!-- Links -->
        <div class="footer-section">
            <h3>Links</h3>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Get Started</a>
        </div>

        <!-- Services -->
        <div class="footer-section">
            <h3>Services</h3>
            <a href="#">App Design</a>
            <a href="#">Web Design</a>
            <a href="#">Logo Design</a>
            <a href="#">Banner Design</a>
        </div>

        <!-- Other -->
        <div class="footer-section">
            <h3>Other services</h3>
            <a href="#">SEO</a>
            <a href="#">Content Marketing</a>
            <a href="#">Prints</a>
            <a href="#">Social Media</a>
        </div>

        <!-- Contact -->
        <div class="footer-section">
            <h3>Contact</h3>
            <a href="#">+91 8879887262</a>
            <a href="#">+91 8879887262</a>
            <a href="#">contact@company.com</a>

            <!-- Social Icons -->
            <div class="media-icons">
                <div>f</div>
                <div>t</div>
                <div>i</div>
                <div>in</div>
                <div>yt</div>
            </div>
        </div>

    </div>

    <div class="footer-bottom">
        <span>Copyright © 2021 company.</span>
        <span>Privacy policy</span>
    </div>

</footer>

</body>
</html>
